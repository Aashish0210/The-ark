<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1a202c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 50px;}
  .container { width: 800px; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative;}
  img { object-fit: contain; }
  .roof { width: 85%; z-index: 30; margin-bottom: -5.5%; }
  .deck { width: 90%; z-index: 20; margin-bottom: -2.5%; }
  .hull { width: 100%; z-index: 10; }
</style>
</head>
<body>
  <div class="container">
    <img src="public/ark-part-3.png" class="roof" />
    <img src="public/ark-part-2.png" class="deck" />
    <img src="public/ark-part-1.png" class="hull" />
  </div>
</body>
</html>
